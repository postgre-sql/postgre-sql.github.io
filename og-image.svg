<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="OG image: PostgreSQL for Windows — Download & Setup">
  <title>PostgreSQL for Windows — Download & Setup</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A74A2"/>
      <stop offset="100%" stop-color="#336791"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#fff" stroke-opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="630" rx="28" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="630" rx="28" fill="url(#grid)"/>

  <!-- Decorative soft light -->
  <ellipse cx="300" cy="-40" rx="420" ry="200" fill="url(#shine)" filter="url(#soft)"/>
  <ellipse cx="1180" cy="640" rx="420" ry="210" fill="url(#shine)" filter="url(#soft)"/>

  <!-- Right-side simple DB glyph (no trademark) -->
  <g transform="translate(840,140)">
    <ellipse cx="140" cy="32" rx="120" ry="32" fill="none" stroke="#EAF2F8" stroke-width="6"/>
    <path d="M20 32v210c0 18 54 32 120 32s120-14 120-32V32" fill="none" stroke="#EAF2F8" stroke-width="6"/>
    <ellipse cx="140" cy="242" rx="120" ry="32" fill="none" stroke="#EAF2F8" stroke-width="6"/>
    <ellipse cx="140" cy="140" rx="120" ry="32" fill="none" stroke="#EAF2F8" stroke-width="6" opacity="0.5"/>
  </g>

  <!-- Text block -->
  <g fill="#ffffff">
    <text x="80" y="220" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="0.3">PostgreSQL for Windows</text>
    <text x="80" y="300" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="56" font-weight="700" letter-spacing="0.2">Download &amp; Setup</text>
    <g opacity="0.95">
      <rect x="80" y="340" rx="10" ry="10" width="245" height="48" fill="#ffffff" opacity="0.18"/>
      <text x="100" y="372" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="700">Windows 10/11 • 64-bit</text>
    </g>
    <text x="80" y="430" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" fill="#EAF2F8" opacity="0.95">Direct download • Offline installer • ODBC drivers • Service • PATH • Migration</text>
  </g>

  <!-- Border highlight -->
  <rect x="6" y="6" width="1188" height="618" rx="24" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="4"/>
</svg>
